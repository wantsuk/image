        listDiv.innerHTML = filtered.map(item => {
            const firstSpace = item.trim().indexOf(' ');
            const num = item.substring(0, firstSpace);
            const title = item.substring(firstSpace + 1);
            return `<div class="song-item"><span class="song-num">${num}</span><span class="song-title">${title}</span></div>`;

        const word = document.getElementById('search').value.toLowerCase();
